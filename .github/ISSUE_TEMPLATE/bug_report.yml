name: Bug report
description: Something isn't working
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `bedrock-pack-tools version`
      placeholder: v3.7.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true
  - type: dropdown
    id: command
    attributes:
      label: Command
      options:
        - keys
        - download
        - decrypt
        - encrypt
        - featured
        - interactive menu (no command)
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What you ran, what you expected, and what you got. Paste the output - you can redact tokens.
      render: shell
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations:
      required: true
